# apps/argocd/values.yaml
configs:
  params:
    server.insecure: true
  cm:
    url: https://argo.oci.sebastiangreen.se

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - argo.oci.sebastiangreen.se
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      - secretName: argocd-tls
        hosts:
          - argo.oci.sebastiangreen.se
