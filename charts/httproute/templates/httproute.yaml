# charts/httproute/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    link.argocd.argoproj.io/external-link: "https://{{ .Values.hostname }}"
spec:
  parentRefs:
    - name: main
      namespace: istio-system
      sectionName: {{ .Values.gatewayListenerName }}
  hostnames:
    - {{ .Values.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ .Values.backendRef.name | quote }}
          port: {{ .Values.backendRef.port }}
