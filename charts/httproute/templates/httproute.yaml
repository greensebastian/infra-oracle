# charts/httproute/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: { { .Release.Name | quote } }
  namespace: { { .Release.Namespace | quote } }
spec:
  parentRefs:
    - name: main
      namespace: istio-system
      sectionName: https
  hostnames:
    - { { .Values.hostname | quote } }
  rules:
    - backendRefs:
        - name: { { .Values.backendRef.name | quote } }
          port: { { .Values.backendRef.port } }
